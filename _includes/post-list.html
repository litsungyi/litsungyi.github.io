<div class="post-list-component">
    <div class="post-list-header">Posts</div>
    <ul class="post-list">
        {% for post in site.posts limit 10 %}
        <li class="post-item">
            <div class="post-item-date">{{ post.date | date: "%b %-d, %Y" }}</div>
            <div><a class="post-item-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title | escape }}</a></div>
        </li>
        {% endfor %}
    </ul>
</div>
